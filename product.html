            padding: 20px;

            'juguete-perro': {
                title: 'Cuerda de Juego Ultra Resistente',
                price: 25000,
                category: 'Accesorios 🐶',
                img: 'https://placehold.co/600x600?text=Juguete+Perro',
                variants: { 'Estándar': 25000 },
                beneficios: 'Ideal para fortalecer la mandíbula y divertirse.',
                caracteristicas: 'Materiales no tóxicos y alta durabilidad.',
                descripcion: 'La cuerda favorita de los perros más energéticos.'
            },
            'juguete-gato': {
                title: 'Kit de Juguetes Interactivos Gatos',
                price: 35000,
                category: 'Accesorios 🐱',
                img: 'https://placehold.co/600x600?text=Juguete+Gato',
                variants: { 'Kit Básico': 35000 },
                beneficios: 'Estimula el instinto de caza y combate el estrés.',
                caracteristicas: 'Materiales suaves, plumas naturales y sonajeros.',
                descripcion: 'El set perfecto para mantener a tu gato activo y feliz.'
            },
            'cama-perro': {
                title: 'Cama Ortopédica Extra Suave XL',
                price: 120000,
                category: 'Descanso 💤',
                img: 'https://placehold.co/600x600?text=Cama+Perro',
                variants: { 'Talla XL': 120000 },
                beneficios: 'Soporte lumbar avanzado para articulaciones cansadas.',
                caracteristicas: 'Espuma viscoelástica, tela transpirable y funda lavable.',
                descripcion: 'La mejor opción para el descanso profundo de tu mascota.'
            },
            'vitaminas': {
                title: 'Complejo Vitamínico Omega 3',
                price: 45000,
                category: 'Farmacia 💊',
                img: 'https://placehold.co/600x600?text=Vitaminas',
                variants: { '30 Cápsulas': 45000 },
                beneficios: 'Mejora la calidad del pelo y la salud cardiovascular.',
                caracteristicas: 'Aceite de pescado purificado, Vitamina E y Omega 3.',
                descripcion: 'Suplemento esencial para fortalecer el sistema inmunológico.'
            }
        };


        async function initProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const pid = urlParams.get('id') || 'hills-sd';
            const pageUrlWithId = `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(pid)}`;

            // 1) Intentar leer desde Firestore
            try {
                const { db } = await import('./js/firebase.js');
                const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');

                const docRef = doc(db, 'products', pid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const prod = docSnap.data();


                    document.getElementById('prod-title').innerText = prod.title;
                    document.getElementById('prod-cat').innerText = prod.category || prod.tag || 'Normal';
                    document.getElementById('prod-price').innerText = `$${Number(prod.price ?? 0).toLocaleString('es-CO')} COP`;

                    const setSafeText = (id, value) => {
                        const el = document.getElementById(id);
                        if (el) el.innerText = value ?? '';
                    };
                    setSafeText('text-beneficios', prod.beneficios);
                    setSafeText('text-caracteristicas', prod.caracteristicas);
                    setSafeText('text-descripcion', prod.descripcion);

                    // Variantes (si existen)
                    const variantBox = document.getElementById('prod-variants');
                    variantBox.innerHTML = '';
                    const variants = prod.variants && typeof prod.variants === 'object' ? prod.variants : {};

                    // Orden estable: intenta ordenar por número dentro del texto (ej: "1 KG", "3 KG")
                    const variantEntries = Object.entries(variants);
                    variantEntries.sort((a, b) => {
                        const an = Number(String(a[0]).match(/([\d.,]+)/)?.[1]?.replace(',', '.') ?? NaN);
                        const bn = Number(String(b[0]).match(/([\d.,]+)/)?.[1]?.replace(',', '.') ?? NaN);
                        const aValid = Number.isFinite(an);
                        const bValid = Number.isFinite(bn);
                        if (aValid && bValid) return an - bn;
                        return String(a[0]).localeCompare(String(b[0]), 'es', { numeric: true });
                    });

                    variantEntries.forEach(([name, price], idx) => {
                        const btn = document.createElement('button');
                        btn.className = `variant-btn ${idx === 0 ? 'active' : ''}`;
                        btn.type = 'button';
                        btn.setAttribute('role', 'radio');
                        btn.setAttribute('aria-checked', idx === 0 ? 'true' : 'false');
                        btn.innerText = name;

                        // dataset para evitar errores por innerText (espacios/saltos)
                        btn.dataset.variant = name;
                        btn.dataset.price = String(price);

                        // stock por variante si existe en Firestore; si no, 0 (bloquear mejor que vender inventario inexistente)
                        const stockFromVariantStock = prod?.variantStock?.[name];
                        btn.dataset.stock = stockFromVariantStock !== undefined ? String(stockFromVariantStock) : '0';

                        btn.onclick = () => changePrice(btn, price);
                        variantBox.appendChild(btn);
                    });

                    currentPrice = Number(prod.price ?? 0);

                    // Asegura que el estado (mensaje/bloqueo) se aplique a la variante inicial seleccionada
                    // cuando el inventario de esa variante sea 0.
                    const initialVariantBtn = variantBox.querySelector('.variant-btn.active');
                    if (initialVariantBtn) {
                        const initialVariantName = initialVariantBtn.innerText;
                        const initialVariantPrice = Number(variants?.[initialVariantName] ?? prod.price ?? 0);
                        changePrice(initialVariantBtn, initialVariantPrice);
                        // Fuerza UI aunque no haya click (evita que el mensaje quede vacío)
                        applyStockUI();
                    } else {
                        // Si no hay variantes renderizadas, limpia mensaje por seguridad
                        const msg = document.getElementById('stock-msg');
                        if (msg) msg.textContent = '';
                    }



                    // Galería
                    const gallery = document.getElementById('prod-gallery');
                    const dotsContainer = document.getElementById('gallery-dots');
                    gallery.querySelectorAll('img:not(#prod-img)').forEach(img => img.remove());
                    dotsContainer.innerHTML = '';

                    const images = Array.isArray(prod.images) && prod.images.length ? prod.images : (prod.img ? [prod.img] : []);
                    const imagesSrc = images.length ? images.slice(0, 6) : ['https://placehold.co/600x600?text=Imagen+1'];

                    const firstImg = document.getElementById('prod-img');
                    firstImg.src = imagesSrc[0];
                    firstImg.classList.add('active');
                    firstImg.alt = prod.title || 'Producto';

                    for (let i = 1; i < imagesSrc.length; i++) {
                        const img = document.createElement('img');
                        img.src = imagesSrc[i];
                        img.loading = 'lazy';
                        img.decoding = 'async';
                        img.alt = prod.title || 'Producto';
                        gallery.appendChild(img);
                    }

                    imagesSrc.forEach((src, idx) => {
                        const dot = document.createElement('span');
                        dot.className = `gallery-dot ${idx === 0 ? 'active' : ''}`;
                        dot.setAttribute('role', 'button');
                        dot.setAttribute('tabindex', '0');
                        dot.setAttribute('aria-label', `Imagen ${idx + 1}`);
                        dot.onclick = () => setGalleryImage(idx);
                        dot.onkeydown = (e) => {
                            if (e.key === 'Enter' || e.key === ' ') setGalleryImage(idx);
                        };
                        dotsContainer.appendChild(dot);
                    });

                    // Precio (tachado/discount) y strike: usa js/product.js solo si está cargado.
                    // Aquí mantenemos el básico para evitar romper.
                    return;
                }
            } catch (e) {
                console.warn('Firestore no disponible en product.html, usando fallback local:', e);
            }

// 2) Fallback local
            const prod = productsDB[pid];
            if(!prod) {
                document.body.innerHTML = '<h1 style="text-align:center; margin-top:100px;">Producto no encontrado</h1>';
                return;
            }
            // Asegura que handleAddToCart tenga acceso al producto cargado (fallback o Firestore)
            window.currentProduct = prod;

            document.getElementById('prod-title').innerText = prod.title;
            document.getElementById('prod-cat').innerText = prod.category;
            document.getElementById('prod-price').innerText = `$${prod.price.toLocaleString('es-CO')} COP`;
            const setSafeText = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.innerText = value ?? '';
            };

            setSafeText('text-beneficios', prod.beneficios);
            setSafeText('text-caracteristicas', prod.caracteristicas);
            setSafeText('text-descripcion', prod.descripcion);

            // Asegura que el mensaje de stock quede consistente desde el inicio
            const msg = document.getElementById('stock-msg');
            if (msg) msg.textContent = '';


            // --- Lógica de Galería de Imágenes ---
            const gallery = document.getElementById('prod-gallery');
            const dotsContainer = document.getElementById('gallery-dots');

            // Obtenemos la imagen base y limpiamos solo las imágenes previas, no el contenedor
            const firstImg = document.getElementById('prod-img');

            // Limpiar imágenes existentes (excepto la primera) y dots
            const existingImgs = gallery.querySelectorAll('img:not(#prod-img)');
            existingImgs.forEach(img => img.remove());
            dotsContainer.innerHTML = '';

            // Definimos las imágenes (repetimos la base para probar el carrusel)
            const imagesSrc = prod.img ? [prod.img, prod.img, prod.img] :
                              ['https://placehold.co/600x600?text=Imagen+1', 'https://placehold.co/600x600?text=Imagen+2', 'https://placehold.co/600x600?text=Imagen+3'];

            // Seteamos la imagen principal (no lazy, para que cargue rápido)
            firstImg.src = imagesSrc[0];
            firstImg.classList.add('active');
            firstImg.alt = prod.title || 'Producto';
            firstImg.loading = 'eager';
            firstImg.decoding = 'async';

            // Agregar las imágenes restantes (lazy)
            for(let i = 1; i < imagesSrc.length; i++) {
                const img = document.createElement('img');
                img.src = imagesSrc[i];
                img.loading = 'lazy';
                img.decoding = 'async';
                img.alt = prod.title || 'Producto';
                gallery.appendChild(img);
            }

            // Crear los dots
            imagesSrc.forEach((src, idx) => {
                const dot = document.createElement('span');
                dot.className = `gallery-dot ${idx === 0 ? 'active' : ''}`;
                dot.setAttribute('role', 'button');
                dot.setAttribute('tabindex', '0');
                dot.setAttribute('aria-label', `Imagen ${idx + 1}`);
                dot.onclick = () => setGalleryImage(idx);
                dot.onkeydown = (e) => {
                    if (e.key === 'Enter' || e.key === ' ') setGalleryImage(idx);
                };
                dotsContainer.appendChild(dot);
            });

                const variantBox = document.getElementById('prod-variants');

                // === Accesibilidad Variantes (botones tipo radio) ===
                variantBox.setAttribute('role', 'radiogroup');

                const localVariantEntries = Object.entries(prod.variants);

                // Orden estable: intenta ordenar por número dentro del texto (ej: "1 KG", "3 KG", "8 KG")
                localVariantEntries.sort((a, b) => {
                    const an = Number(String(a[0]).match(/([\d.,]+)/)?.[1]?.replace(',', '.') ?? NaN);
                    const bn = Number(String(b[0]).match(/([\d.,]+)/)?.[1]?.replace(',', '.') ?? NaN);

                    const aValid = Number.isFinite(an);
                    const bValid = Number.isFinite(bn);

                    if (aValid && bValid) return an - bn;

                    return String(a[0]).localeCompare(String(b[0]), 'es', { numeric: true });
                });

                localVariantEntries.forEach(([name, price], idx) => {

                    const btn = document.createElement('button');
                    btn.className = `variant-btn ${idx === 0 ? 'active' : ''}`;
                    btn.type = 'button';
                    btn.setAttribute('role', 'radio');
                    btn.setAttribute('aria-checked', idx === 0 ? 'true' : 'false');
                    btn.innerText = name;

                    // dataset para que el bloqueo/mensaje funcione igual que en Firestore
                    btn.dataset.variant = name;
                    btn.dataset.stock = '0';
                    btn.dataset.price = String(price);

                    btn.onclick = () => changePrice(btn, price);
                    variantBox.appendChild(btn);
                });
            currentPrice = prod.price;

            // Asegura que el estado (mensaje/bloqueo) se aplique a la variante inicial seleccionada
            // cuando el inventario de esa variante sea 0.
            const initialVariantBtn = variantBox.querySelector('.variant-btn.active');
            if (initialVariantBtn) {
                const initialVariantName = initialVariantBtn.innerText;
                const initialVariantPrice = Number(prod.variants?.[initialVariantName] ?? prod.price ?? 0);
                changePrice(initialVariantBtn, initialVariantPrice);
            } else {
                // Si por alguna razón no hay variante activa, al menos limpiamos mensaje/bloqueo
                const msg = document.getElementById('stock-msg');
                if (msg) msg.textContent = '';
                const btnAdd = document.querySelector('.btn-primary');
                if (btnAdd) {
                    btnAdd.disabled = false;
                    btnAdd.innerText = 'Agregar al Carrito 🐾';
                }
            }


            // === SEO dinámico (title/description/OG/Twitter/JSON-LD Product) ===
            try {
                const fullTitle = `${prod.title} | PetLoversCol`;
                document.title = fullTitle;

                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.setAttribute('content', `Compra ${prod.title} en PetLoversCol. Precio, beneficios y características para tu mascota.`);
                }

                const jsonldEl = document.getElementById('product-jsonld');
                if (jsonldEl) {
                    jsonldEl.textContent = JSON.stringify({
                        "@context": "https://schema.org",
                        "@type": "Product",
                        "name": prod.title,
                        "image": prod.img,
                        "description": prod.descripcion,
                        "brand": { "@type": "Brand", "name": "PetLoversCol" }
                    }, null, 2);
                }

                const setMeta = (selector, value, attrName = 'content') => {
                    const el = document.querySelector(selector);
                    if (el) el.setAttribute(attrName, value);
                };

                setMeta('meta[property="og:title"]', fullTitle);
                setMeta('meta[property="og:description"]', `Compra ${prod.title} en PetLoversCol. Precio, beneficios y características para tu mascota.`);
                setMeta('meta[property="og:image"]', prod.img);
                setMeta('meta[property="og:url"]', pageUrlWithId);

                setMeta('meta[name="twitter:title"]', fullTitle);
                setMeta('meta[name="twitter:description"]', `Compra ${prod.title} en PetLoversCol. Precio, beneficios y características para tu mascota.`);
                setMeta('meta[name="twitter:image"]', prod.img);
            } catch (e) {
                console.log('SEO dinámico (product.html) no aplicado:', e);
            }
        }


        let currentImgIndex = 0;

        window.changeImage = (direction) => {
            const images = document.querySelectorAll('#prod-gallery img');
            const dots = document.querySelectorAll('.gallery-dot');
            if (images.length === 0) return;

            images[currentImgIndex].classList.remove('active');
            dots[currentImgIndex].classList.remove('active');

            currentImgIndex += direction;
            if (currentImgIndex >= images.length) currentImgIndex = 0;
            if (currentImgIndex < 0) currentImgIndex = images.length - 1;

            images[currentImgIndex].classList.add('active');
            dots[currentImgIndex].classList.add('active');
        };

        window.setGalleryImage = (index) => {
            const images = document.querySelectorAll('#prod-gallery img');
            const dots = document.querySelectorAll('.gallery-dot');

            images[currentImgIndex].classList.remove('active');
            dots[currentImgIndex].classList.remove('active');

            currentImgIndex = index;

            images[currentImgIndex].classList.add('active');
            dots[currentImgIndex].classList.add('active');
        };


        function getActiveVariantStockInfo() {
            const variantActive = document.querySelector('.variant-btn.active');
            const variantName = variantActive?.dataset?.variant ? String(variantActive.dataset.variant).trim() : '';
            const stockToCheck = Number(variantActive?.dataset?.stock ?? 0);
            const isOut = Number.isFinite(stockToCheck) && stockToCheck <= 0;

            return {
                variantName,
                hasVariantStock: true,
                stockToCheck: Number.isFinite(stockToCheck) ? stockToCheck : 0,
                isOut
            };
        }

        function applyStockUI() {
            const btnAdd = document.querySelector('.btn-primary');
            const msg = document.getElementById('stock-msg');

            const { isOut } = getActiveVariantStockInfo();

            if (isOut) {
                if (btnAdd) {
                    btnAdd.disabled = true;
                    btnAdd.innerText = '😿 Agotado 🐶 ❌';
                }
                if (msg) msg.textContent = '😿 Agotado 🐶 ❌ Pronto estará disponible';
            } else {
                if (btnAdd) {
                    btnAdd.disabled = false;
                    btnAdd.innerText = 'Agregar al Carrito 🐾';
                }
                if (msg) msg.textContent = '';
            }
        }

        function handleAddToCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];

            const { isOut } = getActiveVariantStockInfo();
            if (isOut) {
                alert('Agotado ❌');
                return;
            }

            // Asegura que el modal exista
            const modal = document.getElementById('continue-shopping-modal');
            const btnGoCart = document.getElementById('btn-go-cart');
            const btnContinue = document.getElementById('btn-continue-shopping');

            const variantActive = document.querySelector('.variant-btn.active');
            const variantText = variantActive?.dataset?.variant ? String(variantActive.dataset.variant) : '';

            const product = {
                name: `${document.getElementById('prod-title').innerText}${variantText ? ` (${variantText})` : ''}`,
                price: currentPrice,
                qty: currentQty
            };

            const existing = cart.find(item => item.name === product.name);
            if (existing) {
                existing.qty += currentQty;
                if (existing.qty > 7) existing.qty = 7;
            } else {
                cart.push(product);
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            alert(`🐾 ${currentQty} unidad(es) agregadas al carrito.`);

            // Reemplaza confirm() por modal
            if (modal) modal.style.display = 'flex';

            if (btnGoCart) {
                btnGoCart.onclick = () => {
                    if (modal) modal.style.display = 'none';
                    window.location.href = 'cart.html';
                };
            }

            if (btnContinue) {
                btnContinue.onclick = () => {
                    if (modal) modal.style.display = 'none';
                };
            }

            const closeBtn = modal ? modal.querySelector('.close-modal') : null;
            if (closeBtn) {
                closeBtn.onclick = () => {
                    if (modal) modal.style.display = 'none';
                };
            }

            if (modal) {
                modal.onclick = (event) => {
                    if (event.target === modal) {
                        modal.style.display = 'none';
                    }
                };
            }
        }

        window.openTab = function(event, tabName) {
            // Ocultar todos los tabs
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => tab.classList.remove('active'));

            // Desactivar todos los botones
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
            });

            // Mostrar el tab seleccionado
            const selectedTab = document.getElementById(tabName);
            if (selectedTab) {
                selectedTab.classList.add('active');
            }

            // Activar el botón clickeado
            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');
            clickedBtn.setAttribute('aria-selected', 'true');
        };

        window.changeQty = function(direction) {
            const qtyElement = document.getElementById('qty');
            let qty = parseInt(qtyElement.innerText);
            qty += direction;
            if (qty < 1) qty = 1;
            if (qty > 10) qty = 10;
            qtyElement.innerText = qty;
            currentQty = qty;
        };

        window.changePrice = function(btn, price) {
            document.querySelectorAll('.variant-btn').forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-checked', 'false');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-checked', 'true');
            currentPrice = price;
            document.getElementById('prod-price').innerText = `$${price.toLocaleString('es-CO')} COP`;

            // Actualiza mensaje/bloqueo SOLO para la variante activa actual
            const btnAdd = document.querySelector('.btn-primary');
            const msg = document.getElementById('stock-msg');

            const { isOut } = getActiveVariantStockInfo();

            if (isOut) {
                if (btnAdd) {
                    btnAdd.disabled = true;
                    btnAdd.innerText = '😿 Agotado 🐶 ❌';
                }
                if (msg) msg.textContent = '😿 Agotado 🐶 ❌ Pronto estará disponible';
            } else {
                if (btnAdd) {
                    btnAdd.disabled = false;
                    btnAdd.innerText = 'Agregar al Carrito 🐾';
                }
                if (msg) msg.textContent = '';
            }
        };


        document.addEventListener('DOMContentLoaded', () => {
            initProduct().catch(console.error);
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCountEl = document.querySelector('.cart-count');
            if (cartCountEl) cartCountEl.innerText = cart.length;
        });
    </script>
