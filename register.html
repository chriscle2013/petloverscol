<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | PetLoversCol</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .back-home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .back-home-link:hover {
            text-decoration: underline;
        }
        .auth-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .auth-title {
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }
        .auth-subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            min-height: 44px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0,86,179,0.1);
        }
        .password-strength {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            background: #dc3545;
            transition: all 0.3s;
        }
        .strength-bar.weak { background: #ffc107; width: 33%; }
        .strength-bar.medium { background: #17a2b8; width: 66%; }
        .strength-bar.strong { background: #28a745; width: 100%; }
        
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            margin-top: 25px;
        }
        .auth-btn:hover {
            background: #004494;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,86,179,0.3);
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
        }
        .auth-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        .error-message, .success-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            animation: loading 1.4s infinite;
        }
        .loading:nth-child(1) { animation-delay: -0.32s; }
        .loading:nth-child(2) { animation-delay: -0.16s; }
        @keyframes loading {
            0%, 60%, 100% { opacity: 1; }
            30% { opacity: 0.5; }
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 30px 20px;
            }
            .auth-title {
                font-size: 1.7rem;
            }
            .auth-logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="back-home-link"><i class="fa-solid fa-house"></i> Volver al inicio</a>
            <div class="auth-logo">🐾</div>
            <h1 class="auth-title">PetLoversCol</h1>
            <p class="auth-subtitle">Crea tu cuenta y comienza</p>
        </div>

        <form id="registerForm">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="form-group">
                <label for="displayName">Nombre Completo</label>
                <input 
                    type="text" 
                    id="displayName" 
                    name="displayName" 
                    placeholder="Ej: Juan Pérez"
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    placeholder="tu@gmail.com, hotmail.com, outlook.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 6 caracteres"
                    required
                    autocomplete="new-password"
                    onchange="checkPasswordStrength()"
                    onkeyup="checkPasswordStrength()"
                >
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <small id="strengthText" style="color: #999;"></small>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirmar Contraseña</label>
                <input 
                    type="password" 
                    id="passwordConfirm" 
                    name="passwordConfirm" 
                    placeholder="Repite la contraseña"
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="auth-btn" id="registerBtn">
                Crear Cuenta
            </button>
        </form>

        <button type="button" class="google-btn" id="googleRegisterBtn">
            <i class="fa-brands fa-google"></i> Registrarse con Google
        </button>

        <div class="auth-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>

    <script type="module">
        import { registerUser, signInWithGoogle, handleGoogleRedirectResult } from './js/auth.js';

        const form = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');
        const googleRegisterBtn = document.getElementById('googleRegisterBtn');

        window.addEventListener('load', async () => {
            const redirectResult = await handleGoogleRedirectResult();
            if (redirectResult.success) {
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'index.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;

            // Validaciones
            if (password.length < 6) {
                errorMsg.textContent = '❌ La contraseña debe tener mínimo 6 caracteres';
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== passwordConfirm) {
                errorMsg.textContent = '❌ Las contraseñas no coinciden';
                errorMsg.style.display = 'block';
                return;
            }

            if (displayName.length < 3) {
                errorMsg.textContent = '❌ El nombre debe tener mínimo 3 caracteres';
                errorMsg.style.display = 'block';
                return;
            }

            if (!isValidEmail(email)) {
                errorMsg.textContent = '❌ Ingresa un correo válido, por ejemplo usuario@gmail.com';
                errorMsg.style.display = 'block';
                return;
            }

            registerBtn.disabled = true;
            const originalText = registerBtn.textContent;
            registerBtn.innerHTML = '<span class="loading"></span> <span class="loading"></span> <span class="loading"></span>';

            const result = await registerUser(email, password, displayName);

            if (result.success) {
                successMsg.textContent = '✅ Cuenta creada exitosamente. Redirigiendo...';
                successMsg.style.display = 'block';
                localStorage.setItem('userLoggedIn', 'true');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                errorMsg.textContent = '❌ ' + getErrorMessage(result.error);
                errorMsg.style.display = 'block';
                registerBtn.textContent = originalText;
                registerBtn.disabled = false;
            }
        });

        window.checkPasswordStrength = function() {
            const password = document.getElementById('password').value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            bar.className = 'strength-bar';
            
            if (password.length === 0) {
                text.textContent = '';
                return;
            }

            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            if (strength <= 1) {
                bar.classList.add('weak');
                text.textContent = 'Contraseña débil';
                text.style.color = '#ffc107';
            } else if (strength === 2 || strength === 3) {
                bar.classList.add('medium');
                text.textContent = 'Contraseña media';
                text.style.color = '#17a2b8';
            } else {
                bar.classList.add('strong');
                text.textContent = 'Contraseña fuerte';
                text.style.color = '#28a745';
            }
        };

        googleRegisterBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            googleRegisterBtn.disabled = true;
            googleRegisterBtn.innerHTML = '<span class="loading"></span> <span class="loading"></span> <span class="loading"></span>';

            const result = await signInWithGoogle();

            if (result.success) {
                if (result.pendingRedirect) {
                    return;
                }
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = '❌ ' + getErrorMessage(result.error);
                errorMsg.style.display = 'block';
                googleRegisterBtn.innerHTML = '<i class="fa-brands fa-google"></i> Registrarse con Google';
                googleRegisterBtn.disabled = false;
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function getErrorMessage(error) {
            if (error.includes('email-already-in-use')) return 'Este correo ya está registrado';
            if (error.includes('weak-password')) return 'La contraseña es muy débil';
            if (error.includes('invalid-email')) return 'Correo inválido. Prueba con un formato como usuario@gmail.com';
            return error;
        }
    </script>
</body>
</html>
