<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | PetLoversCol</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .back-home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .back-home-link:hover {
            text-decoration: underline;
        }
        .auth-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .auth-title {
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 10px;
        }
        .auth-subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            min-height: 44px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0,86,179,0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            margin-top: 25px;
        }
        .auth-btn:hover {
            background: #004494;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,86,179,0.3);
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 44px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
        }
        .forgot-password {
            display: block;
            margin-top: 12px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .auth-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc3545;
        }
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: white;
            animation: loading 1.4s infinite;
        }
        .loading:nth-child(1) { animation-delay: -0.32s; }
        .loading:nth-child(2) { animation-delay: -0.16s; }
        @keyframes loading {
            0%, 60%, 100% { opacity: 1; }
            30% { opacity: 0.5; }
        }
        .divider {
            margin: 30px 0;
            position: relative;
            text-align: center;
            color: var(--text-light);
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
        }

        @media (max-width: 600px) {
            .auth-container {
                padding: 30px 20px;
            }
            .auth-title {
                font-size: 1.7rem;
            }
            .auth-logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="back-home-link"><i class="fa-solid fa-house"></i> Volver al inicio</a>
            <div class="auth-logo">🐾</div>
            <h1 class="auth-title">PetLoversCol</h1>
            <p class="auth-subtitle">Inicia sesión para continuar</p>
        </div>

        <form id="loginForm">
            <div class="error-message" id="errorMessage"></div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    placeholder="tu@gmail.com, outlook.com, hotmail.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Mínimo 6 caracteres"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="auth-btn" id="loginBtn">
                Iniciar Sesión
            </button>
        </form>

        <button type="button" class="google-btn" id="googleLoginBtn">
            <i class="fa-brands fa-google"></i> Continuar con Google
        </button>

        <a href="#" class="forgot-password" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>

        <div class="auth-link">
            ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

    <script type="module">
        import { loginUser, signInWithGoogle, resetPassword, handleGoogleRedirectResult } from './js/auth.js';

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');

        window.addEventListener('load', async () => {
            const redirectResult = await handleGoogleRedirectResult();
            if (redirectResult.success) {
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'index.html';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            loginBtn.disabled = true;
            const originalText = loginBtn.textContent;
            loginBtn.innerHTML = '<span class="loading"></span> <span class="loading"></span> <span class="loading"></span>';

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!isValidEmail(email)) {
                errorMsg.textContent = '❌ Ingresa un correo válido, por ejemplo usuario@gmail.com';
                errorMsg.style.display = 'block';
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
                return;
            }

            const result = await loginUser(email, password);

            if (result.success) {
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = '❌ ' + getErrorMessage(result.error);
                errorMsg.style.display = 'block';
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
        });

        forgotPasswordLink.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();

            if (!isValidEmail(email)) {
                errorMsg.textContent = '❌ Ingresa tu correo para recibir el enlace de recuperación';
                errorMsg.style.display = 'block';
                return;
            }

            const result = await resetPassword(email);
            if (result.success) {
                errorMsg.style.background = '#d4edda';
                errorMsg.style.color = '#155724';
                errorMsg.style.borderLeftColor = '#28a745';
                errorMsg.textContent = '✅ Revisa tu correo para restablecer la contraseña';
                errorMsg.style.display = 'block';
            } else {
                errorMsg.textContent = '❌ ' + getErrorMessage(result.error);
                errorMsg.style.display = 'block';
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            googleLoginBtn.disabled = true;
            googleLoginBtn.innerHTML = '<span class="loading"></span> <span class="loading"></span> <span class="loading"></span>';

            const result = await signInWithGoogle();

            if (result.success) {
                if (result.pendingRedirect) {
                    return;
                }
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = '❌ ' + getErrorMessage(result.error);
                errorMsg.style.display = 'block';
                googleLoginBtn.innerHTML = '<i class="fa-brands fa-google"></i> Continuar con Google';
                googleLoginBtn.disabled = false;
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function getErrorMessage(error) {
            if (error.includes('user-not-found')) return 'Usuario no encontrado';
            if (error.includes('wrong-password')) return 'Contraseña incorrecta';
            if (error.includes('invalid-email')) return 'Correo inválido. Prueba con un formato como usuario@gmail.com';
            if (error.includes('too-many-requests')) return 'Demasiados intentos. Intenta más tarde';
            return error;
        }
    </script>
</body>
</html>
